<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewpoint" content="width=device-width, initial-scale=1" />
    <title>Comic Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">DC Comics</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        Account
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="userInfo.html">User Info</a></li>
                        <li><a class="dropdown-item" href="login.html">Login</a></li>
                        <li><a class="dropdown-item" href="#">Logout</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-4">
    <a href="index.html" class="btn btn-outline-secondary mb-4">Back to Browse</a>

    <div id="loadingState" class="alert alert-info">Loading comic details...</div>
    <div id="errorState" class="alert alert-danger d-none"></div>

    <div id="comicDetail" class="d-none">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 id="comicTitle" class="card-title mb-3"></h1>
                
                <div class="row">
                    <div class="col-md-6">
                        <p><strong>Issue:</strong> <span id="comicIssue"></span></p>
                        <p><strong>Publisher:</strong> <span id="comicPublisher"></span></p>
                        <p><strong>Year:</strong> <span id="comicYear"></span></p>
                    </div>
                    <div class="col-md-6">
                        <p><strong>Status:</strong> <span id="comicStatus"></span></p>
                        <p><strong>Checked Out By:</strong> <span id="comicCheckedOutBy"></span></p>
                    </div>
                </div>
                
                <hr />
                
                <h4>Characters</h4>
                <p id="comicCharacters"></p>
                
                <h4>Description</h4>
                <p id="comicDescription" class="text-muted">
                    No description is available yet for this comic.
                </p>
                
                <div class="mt-4">
                    <button id="checkoutButton" class="btn btn-primary">Checkout This Comic</button>
                    <div id="checkoutMessage" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/comic-detail.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
