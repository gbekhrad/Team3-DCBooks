<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Comics</title>
    
    <!--Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    
    <!-- navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">DC Comics</a>
            
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Home</a>
                    </li>
                </ul>
                
                <ul class="navbar-nav">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            Account
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="checkout.html">My Checkouts</a></li>
                            <li><a class="dropdown-item" href="userInfo.html">User Info</a></li>
                            <li><a class="dropdown-item" href="login.html">Login</a></li>
                            <li><a class="dropdown-item" href="#">Logout</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Bootstrap container adds centered layout and spacing -->
<section class="hero-section">
    <div class="container py-5">
        <div class="hero-card p-4 p-md-5">
            <p class="text-uppercase fw-bold text-primary mb-2">DC Comics Library</p>
            <h1 class="display-4 fw-bold mb-3">Browse Comics</h1>
            <p class="lead text-muted mb-0">
                Search the collection by title, character, or publisher.
            </p>
        </div>
    </div>
</section>

<div class="container py-4">    
        
        <!-- Boostrap search/filter row -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <input id="titleFilter" type="text" class="form-control" placeholder="Search by title">
            </div>
            <div class="col-md-4">
                <input id="characterFilter" type="text" class="form-control" placeholder="Search by character">
            </div>
            <div class="col-md-4">
                <input id="publisherFilter" type="text" class="form-control" placeholder="Search by publisher">
            </div>
        </div>
        
        <!--Comics get inserted here -->
        <div id="comicList" class="row"></div>
    </div>

    <!-- js files -->
    <script src="js/home.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
