<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Comics</title>

    <!--Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">

<main class="container">
    <div class="card p-4 shadow-sm" style="max-width: 400px; margin: auto;">
        <form>
            <h1 class="h3 mb-4 fw-normal text-center">Please sign in</h1>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInput" placeholder="Username"/>
                <label for="floatingInput">Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" placeholder="Password"/>
                <label for="floatingPassword">Password</label>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary w-100 py-2" type="submit">
                    Sign in
                </button>
            </div>
        </form>
        <p class="mt-3">
            Not registered?
            <a href="createAccount.html">Create an
                account</a>
        </p>
    </div>
</main>
</body>

</html>
