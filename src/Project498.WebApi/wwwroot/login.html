<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Comics</title>

    <!--Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- Bootstrap navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">DC Comics</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<main class="container d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
    <div class="card p-4 shadow-sm" style="max-width: 400px; margin: auto;">
        <form id="loginForm">
            <h1 class="h3 mb-4 fw-normal text-center">Please sign in</h1>

            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="floatingInput" name="username" placeholder="Username" required/>
                <label for="floatingInput">Username</label>
            </div>

            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="floatingPassword" name="password" placeholder="Password" required/>
                <label for="floatingPassword">Password</label>
            </div>

            <div class="mt-3">
                <button class="btn btn-primary w-100 py-2" type="submit">
                    Sign in
                </button>
                <div id="errorMessage" class="text-danger mt-2 text-center"></div>
            </div>
        </form>
        <p class="mt-3">
            Not registered?
            <a href="createAccount.html">Create an
                account</a>
        </p>
    </div>
</main>
    <script src="js/login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
