<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DC Comics</title>

    <!--Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Signika:wght@400;500;600;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="d-flex align-items-center justify-content-center vh-100 bg-body-tertiary">
<button class="btn btn-outline-secondary position-absolute top-0 start-0 m-3"
        onclick="window.history.back()">
    ← Back
</button>
<main class="container">
    <div class="card p-4 shadow-sm" style="max-width: 500px; margin: auto;">
    <form id="accountForm">
        <h1 class="h3 mb-4 fw-normal text-center">Account</h1>

        <!-- First Name -->
        <div class="mb-3 col-11">
            <label for="firstName">First Name</label>
            <input type="text" class="form-control" id="firstName" placeholder="First Name">
        </div>

        <!-- Last Name -->
        <div class="mb-3 col-11">
            <label for="lastName">Last Name</label>
            <input type="text" class="form-control" id="lastName" placeholder="Last Name">
        </div>

        <!-- Username (readonly + modal trigger) -->
        <div class="mb-3">
            <label class="form-label">Username</label>
            <div class="d-flex gap-2">
                <div class="col-11">
                    <input type="text" class="form-control" id="username" readonly>
                </div>
                <div class="col-2">
                    <button type="button" class="btn btn-outline-secondary"
                            data-bs-toggle="modal" data-bs-target="#usernameModal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Email (same pattern if you want later) -->
        <div class="mb-3 justify-content-center">
            <label class="form-label">Email</label>
            <div class="d-flex gap-2">
                <div class="col-11">
                    <input type="email" class="form-control" id="email" readonly>
                </div>
                <div class="col-2">
                    <button type="button" class="btn btn-outline-secondary"
                        data-bs-toggle="modal" data-bs-target="#emailModal">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-pencil" viewBox="0 0 16 16">
                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Password (modal only) -->
        <div class="mb-3 col-11">
            <label class="form-label">Password</label>
            <button type="button" class="btn btn-outline-secondary w-100"
                    data-bs-toggle="modal" data-bs-target="#passwordModal">
                Change Password
            </button>
        </div>
        
        <!-- Delete account button -->
        <div class="mt-5 text-center">
            <button type="button" class="btn btn-danger"
                    data-bs-toggle="modal" data-bs-target="#deleteAccountModal">
                Delete Account
            </button>
        </div>
    </form>

        <!-- USERNAME MODAL -->
        <div class="modal fade" id="usernameModal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-4">
                    <h5>Change Username</h5>

                    <input type="text" class="form-control mb-2" id="newUsername">
                    <div id="usernameError" class="text-danger mb-2"></div>

                    <button type="button" class="btn btn-primary" id="saveUsername">
                        Save
                    </button>
                </div>
            </div>
        </div>
        <!-- EMAIL MODAL -->
        <div class="modal fade" id="emailModal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-4">
                    <h5>Change Email</h5>

                    <input type="text" class="form-control mb-2" id="newEmail">
                    <div id="emailError" class="text-danger mb-2"></div>

                    <button type="button" class="btn btn-primary" id="saveEmail">
                        Save
                    </button>
                </div>
            </div>
        </div>
        
        <!-- PASSWORD MODAL -->
        <div class="modal fade" id="passwordModal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-4">

                    <h5>Change Password</h5>

                    <input type="text" class="form-control mb-2" id="oldPassword" placeholder="Old Password">

                    <input type="text" class="form-control mb-2" id="newPassword" placeholder="New Password">
                    <div id="repeatError" class="text-danger"></div>

                    <input type="text" class="form-control mb-2" id="confirmPassword" placeholder="Confirm Password">
                    <div id="matchError" class="text-danger mb-2"></div>

                    <button type="submit" class="btn btn-primary w-100" id="savePassword">
                        Save
                    </button>

                    <div id="passwordMessage" class="text-danger mb-2"></div>  
                </div>
            </div>
        </div>
        
        <!-- DELETE MODAL -->
        <div class="modal fade" id="deleteAccountModal">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content p-4 text-center">

                    <h5 class="text-danger">Delete Account?</h5>
                    <p>This action cannot be undone.</p>

                    <div id="deleteError" class="text-danger mb-2"></div>
                    
                    <input type="text" id="deleteConfirmInput" class="form-control mb-2"
                           placeholder="Type DELETE to confirm">
                    <button class="btn btn-danger" id="confirmDelete" disabled>
                        Yes, Delete
                    </button>
                    <div class="d-flex justify-content-center gap-2">
                        <button class="btn btn-secondary mt-2" data-bs-dismiss="modal">
                            Cancel
                        </button>
                    </div>
                </div>
            </div>
        </div>
        
    </div>
</main>
<script src="js/userInfo.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
